<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus { border-color: #6c63ff; }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover { background: #574fd6; }
    .input-row button:active { transform: scale(0.95); }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: #fff;
      color: #555;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      background: #6c63ff;
      color: #fff;
    }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done { opacity: 0.5; }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      color: #222;
      word-break: break-word;
      outline: none;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .todo-text:focus {
      border-bottom: 1px dashed #6c63ff;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #e53935; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #888;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53935;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fdecea; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>My Todos</h1>
    <p class="subtitle" id="date"></p>

    <div class="input-row">
      <input type="text" id="new-todo" placeholder="Add a new task..." maxlength="200" />
      <button id="add-btn" title="Add task">+</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
    </div>

    <ul class="todo-list" id="todo-list">
      <li class="empty" id="empty-msg">No tasks yet. Add one above!</li>
    </ul>

    <div class="footer">
      <span id="count"></span>
      <button class="clear-btn" id="clear-done">Clear completed</button>
    </div>
  </div>

  <script>
    const KEY = 'vibecraft-todos';
    let todos = JSON.parse(localStorage.getItem(KEY) || '[]');
    let filter = 'all';

    // Show today's date
    document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    function save() {
      localStorage.setItem(KEY, JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      list.innerHTML = '';

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">Nothing here!</li>';
      } else {
        visible.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.done ? ' done' : '');
          li.dataset.id = todo.id;

          li.innerHTML = `
            <input type="checkbox" ${todo.done ? 'checked' : ''} title="Mark complete" />
            <span class="todo-text" contenteditable="true" spellcheck="false">${escHtml(todo.text)}</span>
            <button class="delete-btn" title="Delete">✕</button>
          `;

          // Toggle done
          li.querySelector('input[type="checkbox"]').addEventListener('change', e => {
            const t = todos.find(x => x.id === todo.id);
            t.done = e.target.checked;
            save(); render();
          });

          // Inline edit
          const span = li.querySelector('.todo-text');
          span.addEventListener('blur', () => {
            const t = todos.find(x => x.id === todo.id);
            const val = span.textContent.trim();
            if (val) { t.text = val; save(); }
            else { span.textContent = t.text; }
          });
          span.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
          });

          // Delete
          li.querySelector('.delete-btn').addEventListener('click', () => {
            todos = todos.filter(x => x.id !== todo.id);
            save(); render();
          });

          list.appendChild(li);
        });
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('count').textContent =
        `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save(); render();
    }

    document.getElementById('add-btn').addEventListener('click', addTodo);
    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    document.getElementById('clear-done').addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save(); render();
    });

    render();
  </script>
</body>
</html>
